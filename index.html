    <!-- Script Generate Logo PNG Kualitas Tinggi Otomatis -->
    <script>
        (function() {
            var canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#4f46e5';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.fillStyle = 'white';
            ctx.font = '900 380px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 20;
            
            ctx.strokeText('Q', 256, 285);
            ctx.fillText('Q', 256, 285);
            
            var dataURL = canvas.toDataURL('image/png');
            
            var appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = dataURL;
            document.head.appendChild(appleIcon);
            
            var stdIcon = document.createElement('link');
            stdIcon.rel = 'icon';
            stdIcon.type = 'image/png';
            stdIcon.href = dataURL;
            document.head.appendChild(stdIcon);
        })();
    </script>

                const todayStr = getLocalDateStr();
                if(targetDateStr >= todayStr) uniqueDates.add(todayStr);

                uniqueDates.forEach(dateStr => {

                });

                    if (a.type === 'masuk') bal += a.amount;

                showStatus(holidays.includes(dateStr) ? 'Hari Kerja Diaktifkan' : 'Warung Libur Diset!', 'success');

            const renderAgendaSummary = () => {
                const dStr = agendaDate;
                let dayInc = incomes.filter(i => i.date === dStr).reduce((s,i) => s + i.amount, 0);
                let dayExp = history.filter(h => h.date === dStr).reduce((s,h) => s + h.total, 0);
                let agIn = agendas.filter(a => a.date === dStr && a.type === 'masuk').reduce((s,a) => s + a.amount, 0);
                
                // Pribadi ikut mengurangi kas
                let agOut = agendas.filter(a => a.date === dStr && (a.type === 'keluar' || a.type === 'pribadi')).reduce((s,a) => s + a.amount, 0);
                
                // Pengurang Deduction
                let dedOut = getActiveDeductionsTotal(dStr);

                let totalIn = dayInc + agIn;
                let totalOut = dayExp + agOut + dedOut;

                let prevDateObj = new Date(dStr);
                prevDateObj.setDate(prevDateObj.getDate() - 1);
                let prevBal = getBalanceUpTo(getLocalDateStr(prevDateObj));
                let currentBal = prevBal + totalIn - totalOut;

                return (

            const renderCalendar = () => {
                const parts = agendaDate.split('-');

            const handleMarketModeAdd = (e) => {

            const renderMarketMode = () => {

                    let parsed = parseFloat(curr.actualTotal.toString().replace(/[^0-9]/g, ''));

                // Kalkulasi Sisa Saldo

                                <input type="text" inputMode="numeric" value={formatInputRp(marketCash)} onChange={e => setMarketCash(parseInputRp(e.target.value))} placeholder="Isi Saldo (Rp)" className="w-32 bg-indigo-900/50 text-white placeholder-indigo-300 text-right font-black text-[11px] outline-none px-2.5 py-1.5 rounded-lg border border-indigo-500/50 focus:border-indigo-300 transition-colors" />

                                                className={`w-8 bg-transparent outline-none text-center text-[11px] font-black py-1 ${item.isBought ? 'text-slate-500' : 'text-slate-800 dark:text-slate-100'}`}
                                            />
                                            <select 
                                                value={item.unit} 
                                                onChange={(e) => updateCartActual(item.id, 'unit', e.target.value)}

                                            >

                                        <input type="text" inputMode="numeric" value={formatInputRp(item.actualTotal)} onChange={(e) => updateCartActual(item.id, 'actualTotal', parseInputRp(e.target.value))} placeholder="H. Asli" className={`w-[85px] min-w-[85px] px-1.5 py-1.5 rounded-lg text-[10px] font-black outline-none focus:ring-2 focus:ring-green-400 transition-colors text-right shrink-0 ${item.isBought ? 'bg-white dark:bg-slate-900 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800' : 'bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 border border-slate-200 dark:border-slate-700'}`} />
                                        
                                        <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="w-5 h-5 shrink-0 flex items-center justify-center text-red-400 hover:text-red-500 transition-colors">

                            {/* FITUR BARU: Tambah Item Mini Form di Mode Pasar (+Dropdown Satuan) */}

                                <input type="text" value={marketNewItem.name} onChange={e => setMarketNewItem({...marketNewItem, name: e.target.value})} placeholder="Tambah brg..." className="flex-1 min-w-[50px] p-2 rounded-lg text-[10px] font-bold bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 outline-none uppercase text-slate-800 dark:text-slate-200" />
                                
                                <div className="flex bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg overflow-hidden shrink-0">
                                    <input type="number" step="any" value={marketNewItem.qty} onChange={e => setMarketNewItem({...marketNewItem, qty: e.target.value})} placeholder="Qty" className="w-9 p-2 text-[10px] font-bold text-center bg-transparent outline-none text-slate-800 dark:text-slate-200" />
                                    <select value={marketNewItem.unit} onChange={e => setMarketNewItem({...marketNewItem, unit: e.target.value})} className="w-10 bg-slate-100 dark:bg-slate-800 text-[9px] font-black uppercase text-center appearance-none outline-none border-l border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300">
                                        {commonUnits.map(u => <option key={u} value={u}>{u}</option>)}
                                    </select>
                                </div>

                                <input type="text" inputMode="numeric" value={formatInputRp(marketNewItem.actualTotal)} onChange={e => setMarketNewItem({...marketNewItem, actualTotal: parseInputRp(e.target.value)})} placeholder="H.Asli" className="w-[85px] shrink-0 p-2 rounded-lg text-[10px] font-bold text-right bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 outline-none text-slate-800 dark:text-slate-200" />
                                <button type="submit" className="bg-indigo-600 text-white p-2.5 rounded-lg shadow-sm hover:bg-indigo-700 shrink-0"><div className="w-3.5 h-3.5"><Icons.Plus /></div></button>
                            </form>

                            {/* Footer Market Mode (Total & Action) */}
                            <div className="bg-slate-900 p-4 rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(0,0,0,0.2)] shrink-0 z-20 relative mt-auto">
                                <div className="flex justify-between items-start mb-4 px-2">

                                        <p className="text-[10px] font-bold text-slate-400 uppercase">Total Estimasi</p>
                                        <p className="text-sm font-black text-slate-300">Rp {formatNumber(totalEstimasi)}</p>
                                    </div>
                                    <div className="text-right space-y-1">
                                        <p className="text-[10px] font-bold text-green-400 uppercase tracking-widest">Total Realita</p>
                                        <p className="text-lg font-black text-green-500 leading-none mt-0.5">Rp {formatNumber(totalRealita || 0)}</p>
                                        
                                        {/* Indikator Sisa Uang Kalkulator */}
                                        {cashNum > 0 && (
                                            <div className={`mt-1.5 pt-1.5 border-t ${isSisaMinus ? 'border-red-500/50' : 'border-slate-700'}`}>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{isSisaMinus ? 'Kurang Uang' : 'Sisa Uang'}</p>
                                                <p className={`text-[13px] font-black mt-0.5 ${isSisaMinus ? 'text-red-500' : 'text-indigo-400'}`}>Rp {formatNumber(Math.abs(sisaCash))}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-2">

                                        SIMPAN SAJA
                                    </button>
                                    <button onClick={handleFinalizeMarket} disabled={isSaving || cart.length===0} className="w-[60%] py-3.5 bg-green-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:bg-green-600 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-1">
                                        ✅ POTONG KAS
                                    </button>

                );
            }

            const getDashboardData = () => {
                const todayStr = getLocalDateStr();
                
                const yesterdayObj = new Date();
                yesterdayObj.setDate(yesterdayObj.getDate() - 1);
                const yesterdayStr = getLocalDateStr(yesterdayObj);
                
                let todayIncomes = incomes.filter(i => i.date === todayStr);
                if (todayIncomes.length === 0) {
                    todayIncomes = incomes.filter(i => i.date === yesterdayStr);
                }
                const todayInc = todayIncomes.reduce((s,i) => s + i.amount, 0);

                const todayExp = history.filter(h => h.date === todayStr).reduce((s,h) => s + h.total, 0);

                const [yearStr, monthStr] = dashboardMonth.split('-');
                const year = parseInt(yearStr);
                const month = parseInt(monthStr) - 1;
                const startDate = new Date(year, month, 1);
                const endDate = new Date(year, month + 1, 0);

                let reportDays = [];
                let startStr = getLocalDateStr(startDate);
                
                let prevDateObj = new Date(startDate);
                prevDateObj.setDate(prevDateObj.getDate() - 1);
                let runningBalance = getBalanceUpTo(getLocalDateStr(prevDateObj));

                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    let dStr = getLocalDateStr(d);
                    let isFuture = dStr > todayStr;
                    let isToday = dStr === todayStr;

                    let dayIncomes = incomes.filter(i => i.date === dStr);
                    let dayExpenses = history.filter(h => h.date === dStr);
                    let dayAgendas = agendas.filter(a => a.date === dStr);

                    let actualInc = dayIncomes.reduce((s, i) => s + i.amount, 0);
                    let actualExp = dayExpenses.reduce((s, h) => s + h.total, 0);
                    let agendaIn = dayAgendas.filter(a=>a.type==='masuk').reduce((s,a) => s + a.amount, 0);
                    let agendaOut = dayAgendas.filter(a=>a.type==='keluar' || a.type==='pribadi').reduce((s,a) => s + a.amount, 0);
                    
                    let dedOut = getActiveDeductionsTotal(dStr);

                    let isHoliday = holidays.includes(dStr);

                    let baseIn = (isFuture && !isHoliday) ? settings.targetOmzet : actualInc;
                    let dailyIn = baseIn + agendaIn;

                    let baseOut = (isFuture && !isHoliday) ? settings.maxBelanja : actualExp;
                    let dailyOut = baseOut + agendaOut + dedOut;

                    let saldoPagi = runningBalance;
                    runningBalance = saldoPagi + dailyIn - dailyOut;

                    reportDays.push({
                        date: dStr,
                        displayDate: d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                        isToday, isFuture, isHoliday, saldoPagi, dailyIn, dailyOut, saldoAkhir: runningBalance,
                        hasData: actualInc > 0 || actualExp > 0 || agendaIn > 0 || agendaOut > 0 || dedOut > 0,
                        details: { incomes: dayIncomes, expenses: dayExpenses, agendas: dayAgendas, deductions: dedOut }
                    });
                }

                return { todayInc, todayExp, reportDays };
            };

            // LOGIKA LAPORAN BULANAN
            const getLaporanData = (month) => {
                const hists = history.filter(h => h.date.startsWith(month));
                const incs = incomes.filter(i => i.date.startsWith(month));
                const ags = agendas.filter(a => a.date.startsWith(month));

                const [yearStr, monthStr] = month.split('-');
                const year = parseInt(yearStr);
                const m = parseInt(monthStr) - 1;
                const daysInMonth = new Date(year, m + 1, 0).getDate();
                
                let totalDeductions = 0;
                let deductionDetails = {};
                for (let d = 1; d <= daysInMonth; d++) {
                    let dObj = new Date(year, m, d);
                    let dStr = getLocalDateStr(dObj);
                    deductions.forEach(ded => {
                        if (dStr >= ded.startDate && dStr <= ded.endDate) {
                            totalDeductions += ded.amount;
                            deductionDetails[ded.name] = (deductionDetails[ded.name] || 0) + ded.amount;
                        }
                    });
                }

                // Pemisahan Penjualan dan Hutang/Lainnya
                const pendapatanPenjualan = incs.filter(i => i.category !== 'Lainnya').reduce((s,i) => s + i.amount, 0);
                const pendapatanLainnya = incs.filter(i => i.category === 'Lainnya').reduce((s,i) => s + i.amount, 0) + ags.filter(a => a.type === 'masuk').reduce((s,a) => s + a.amount, 0);
                
                const rincianPenjualan = {};
                incs.filter(i => i.category !== 'Lainnya').forEach(i => {
                    rincianPenjualan[i.source] = (rincianPenjualan[i.source] || 0) + i.amount;
                });

                const hppTotal = hists.reduce((s,h) => s + h.total, 0);
                const oprTotal = ags.filter(a => a.type === 'keluar').reduce((s,a) => s + a.amount, 0);
                const pribadiTotal = ags.filter(a => a.type === 'pribadi').reduce((s,a) => s + a.amount, 0);

                let itemMap = {};
                hists.forEach(h => h.items.forEach(it => { itemMap[it.name] = (itemMap[it.name] || 0) + it.total; }));
                const topBelanja = Object.entries(itemMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>({name:x[0], total:x[1]}));

                let oprMap = {};
                ags.filter(a => a.type === 'keluar').forEach(a => { oprMap[a.title] = (oprMap[a.title] || 0) + a.amount; });
                const topOpr = Object.entries(oprMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>({name:x[0], total:x[1]}));

                const labaKotor = pendapatanPenjualan - hppTotal;
                const labaBersih = (pendapatanPenjualan + pendapatanLainnya) - (hppTotal + oprTotal + totalDeductions);
                
                const targetOmzet = settings.targetOmzet * daysInMonth;
                const omzetTercapai = pendapatanPenjualan;
                const pctTarget = targetOmzet > 0 ? (omzetTercapai / targetOmzet) * 100 : 0;
                const cogsRatio = omzetTercapai > 0 ? (hppTotal / omzetTercapai) * 100 : 0;
                const bep = hppTotal + oprTotal + totalDeductions;

                // DATA TAMBAHAN UNTUK PDF
                const totalTransaksiPenjualan = incs.filter(i => i.category !== 'Lainnya').length;
                const totalTransaksiBelanja = hists.length;
                const rataRataPenjualanHarian = pendapatanPenjualan / daysInMonth;
                const rataRataBelanjaHarian = hppTotal / daysInMonth;
                
                const hutangLunas = ags.filter(a => a.type === 'keluar' && (a.isPaid || a.date < getLocalDateStr())).map(a => ({...a, status: 'Lunas'}));
                const hutangBelum = ags.filter(a => a.type === 'keluar' && !a.isPaid && a.date >= getLocalDateStr()).map(a => ({...a, status: 'Belum Lunas'}));
                const semuaTagihan = [...hutangBelum, ...hutangLunas];

                return { 
                    month, timestamp: Date.now(),
                    pendapatanPenjualan, pendapatanLainnya, rincianPenjualan,
                    hppTotal, oprTotal, totalDeductions, deductionDetails, pribadiTotal,
                    labaKotor, labaBersih, topBelanja, topOpr,
                    targetOmzet, omzetTercapai, pctTarget, cogsRatio, bep,

                try {
                    const canvas = await html2canvas(printArea, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const imgHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    let heightLeft = imgHeight;
                    let position = 0;

                    // Halaman Pertama
                    pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
                    heightLeft -= pdfHeight;

                    // Loop untuk multipage (Jika laporan panjang dan terpotong ke halaman berikutnya)
                    while (heightLeft > 0) {
                        position = position - pdfHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);

                    pdf.save(`Laporan_Fin_${reportMonth}.pdf`);

[DATA]
Omzet Penjualan Murni: Rp${d.pendapatanPenjualan}
HPP (Belanja Bahan): Rp${d.hppTotal}

                var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;

            const renderHppAnalysis = () => {
                const handleHppDateChange = (e) => {
                    const d = e.target.value;
                    setHppDate(d);
                    const existing = dailyStocks.find(s => s.date === d);
                    setHppStockValue(existing ? existing.totalValue : '');
                    // Analisa AI sengaja tidak di-reset agar tabel tetap muncul sebelum digenerate ulang
                };

                const handleSaveStock = () => {
                    const val = parseFloat(hppStockValue.toString().replace(/[^0-9]/g, '')) || 0;
                    const newStocks = [...dailyStocks.filter(s => s.date !== hppDate), { date: hppDate, totalValue: val }];
                    setDailyStocks(newStocks);
                    showStatus('Stok Akhir Disimpan!', 'success');
                };

                const handleSaveMenu = (e) => {
                    e.preventDefault();
                    if(!menuForm.name) return;
                    
                    const finalPrices = {};
                    Object.keys(menuForm.inputs || {}).forEach(ch => {
                        const netVal = parseFloat(menuForm.inputs[ch].net?.toString().replace(/[^0-9]/g, ''));
                        if (!isNaN(netVal) && netVal > 0) finalPrices[ch] = netVal;
                    });

                    const newM = {
                        id: Date.now(),
                        name: menuForm.name,
                        prices: finalPrices
                    };
                    setMenus([...menus, newM]);
                    setMenuForm({ name: '', inputs: {} });
                    showStatus('Menu Tersimpan', 'success');
                };

                const updateMenuInput = (ch, field, val) => {
                    setMenuForm(prev => {
                        const currentCh = (prev.inputs && prev.inputs[ch]) || { gross: '', pct: '', net: '' };
                        let newCh = { ...currentCh, [field]: val };

                        // Kalkulasi otomatis Harga Bersih jika Kotor/Persen diubah
                        if (field === 'gross' || field === 'pct') {
                            const g = parseFloat(newCh.gross.toString().replace(/[^0-9]/g, '')) || 0;
                            const p = parseFloat(newCh.pct) || 0;
                            if (g > 0) {
                                newCh.net = Math.round(g - (g * p / 100)).toString();
                            } else {
                                newCh.net = '';
                            }
                        }

                        return { ...prev, inputs: { ...(prev.inputs || {}), [ch]: newCh } };
                    });
                };

                const handleAddChannel = (e) => {
                    e.preventDefault();
                    const stdName = toTitleCase(newChannelName.trim());
                    if(stdName && !salesChannels.includes(stdName)){
                        setSalesChannels([...salesChannels, stdName]);
                        setNewChannelName('');
                        showStatus('Channel Jualan Ditambahkan', 'success');
                    }
                };

                const handleDeleteChannel = (channelToDelete) => {
                    setConfirmModal({
                        show: true,
                        title: 'Hapus Channel?',
                        message: `Yakin ingin menghapus channel "${channelToDelete}"?`,
                        onConfirm: () => {
                            setSalesChannels(prev => prev.filter(c => c !== channelToDelete));
                            setConfirmModal({ show: false, title: '', message: '', onConfirm: null });
                            showStatus(`Channel ${channelToDelete} dihapus!`, 'success');
                        }
                    });
                };

                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setReportDataState(ars); setReportAIInsight(ars.aiInsight || ''); setShowReportFullscreen(true); }} className="px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 font-black rounded-lg text-[9px] uppercase tracking-widest">Lihat</button>
                                                        <button onClick={() => hapusArsipLaporan(ars.month)} className="w-8 h-8 bg-red-50 dark:bg-red-900/30 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100"><div className="w-3.5 h-3.5"><Icons.Trash/></div></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        {/* RENDER MARKET MODE & LAPORAN FULLSCREEN */}
                        {showHppAnalysis && renderHppAnalysis()}
                        {showReportFullscreen && renderReportFullscreen()}
                        {showMarketMode && renderMarketMode()}
                    </main>

                    {/* Draggable Fin AI Button Wrapper */}
                    <div 
                        className={`fixed z-[550] transition-opacity duration-300 ${isChatOpen || showMarketMode ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                        style={{ right: `${finPos.right}px`, bottom: `${finPos.bottom}px`, touchAction: 'none' }}
                        onPointerDown={handleFinPointerDown}
                        onPointerMove={handleFinPointerMove}
                        onPointerUp={handleFinPointerUp}
                        onPointerCancel={handleFinPointerUp}
                    >
                        <button 
                            onClick={handleFinClick} 
                            className="relative bg-indigo-600 text-white p-4 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] border border-indigo-400 active:scale-95 transition-transform"
                        >
                            <div className="w-6 h-6 pointer-events-none"><Icons.MessageCircle /></div>
                            {hasNewFinAlert && <span className="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full animate-pulse pointer-events-none"></span>}
                        </button>
                    </div>

                    <div className={`fixed left-1/2 -translate-x-1/2 z-[160] transition-all duration-500 ease-in-out ${showNav || showMarketMode || showHppAnalysis || showReportFullscreen ? 'bottom-28 opacity-0 pointer-events-none translate-y-10' : 'bottom-6 opacity-100 translate-y-0'}`}>
                        <button onClick={() => setShowNav(true)} className="bg-slate-900/90 dark:bg-slate-800/90 backdrop-blur-md text-white px-5 py-3 rounded-full shadow-2xl border border-slate-700/50 flex items-center gap-2 hover:bg-slate-800 dark:hover:bg-slate-700 transition-colors">
                            <div className="w-5 h-5"><Icons.ChevronUp /></div>
                            <span className="text-[11px] font-black uppercase tracking-widest">Menu Utama</span>
                        </button>
                    </div>

                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] glass-nav rounded-[2.5rem] flex justify-between px-2 py-2 z-[150] shadow-2xl border border-slate-700/50 transition-all duration-500 ease-in-out ${showNav && !(showMarketMode || showHppAnalysis || showReportFullscreen) ? 'bottom-6 translate-y-0 opacity-100' : '-bottom-32 translate-y-full opacity-0 pointer-events-none'}`}>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2">
                            <button onClick={() => setShowNav(false)} className="w-16 h-5 bg-slate-900/95 dark:bg-slate-800/95 backdrop-blur-md rounded-t-full flex items-center justify-center border-t border-x border-slate-700/50 dark:border-slate-600/50 text-slate-400 hover:text-white cursor-pointer group shadow-lg">
                                <div className="w-4 h-4 group-hover:translate-y-0.5 transition-transform"><Icons.ChevronDown /></div>
                            </button>
                        </div>

                        <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Bot /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">C-Flow</span>
                        </button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'plan' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.ShopBag /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Belanja</span>
                        </button>
                        <button onClick={() => setActiveTab('income')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'income' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Wallet /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Income</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'agenda' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Calendar /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Operasi</span>
                        </button>
                        <button onClick={() => setActiveTab('arsip')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'arsip' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Archive /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Arsip</span>
                        </button>
                    </nav>

                    {renderFloatingFin()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
