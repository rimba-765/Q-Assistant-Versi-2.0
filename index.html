            db = firebase.firestore();

            isLocalMode = true;

                else document.documentElement.classList.remove('dark');

            useEffect(() => {
                if (activeTab === 'dashboard') {
                    setTimeout(() => todayRowRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
                }

            const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(num);

                if (val === undefined || val === null || val === '') return '';
                let numStr = val.toString().replace(/[^0-9]/g, '');
                if (numStr === '') return '';
                return 'Rp ' + formatNumber(numStr);

            const parseInputRp = (val) => {
                if(val === undefined || val === null) return '';
                return val.toString().replace(/[^0-9]/g, '');
            }

            const showStatus = (message, type = 'success') => {

                setTimeout(() => setStatus(prev => ({ ...prev, show: false })), 3000);
            };

            const paths = useMemo(() => {
                if (isLocalMode || !user) return null;
                return { history: `artifacts/${appId}/users/${user.uid}/history`, master: `artifacts/${appId}/users/${user.uid}/master/data`, cart: `artifacts/${appId}/users/${user.uid}/current/cart` };
            }, [user]);

            const handleResetAllData = () => {
                setConfirmModal({
                    show: true, title: 'Reset Data Bulanan?',
                    message: 'AWAS! Semua data Pemasukan, Pengeluaran, Agenda, dan Arsip akan dihapus secara PERMANEN. Lanjutkan?',
                    onConfirm: async () => {
                        setConfirmModal({ ...confirmModal, show: false }); showStatus('Membersihkan data...', 'loading');
                        setHistory([]); setIncomes([]); setAgendas([]); setCart([]);
                        if (!isLocalMode && user && paths) {
                            try {
                                const snapshot = await db.collection(paths.history).get();
                                const batch = db.batch(); snapshot.docs.forEach(doc => batch.delete(doc.ref)); await batch.commit();
                            } catch (e) { console.error("Gagal membersihkan cloud", e); }
                        }
                        setShowSettings(false); showStatus('Semua Data Berhasil Direset!', 'success');
                    }
                });
            };

            const handleResetChat = () => {
                if(window.confirm('Bersihkan riwayat obrolan dengan Fin?')) {
                    setChats([{ id: Date.now(), sender: 'fin', text: `Halo Bos! Ada yang mau dicatat? 🚀`, type: 'text' }]);
                }
            };

            const handleExit = () => {
                setConfirmModal({
                    show: true, title: 'Keluar Aplikasi?', message: 'Ingin menutup sesi ini? Data sudah aman.',
                    onConfirm: () => { setConfirmModal({ show: false, title: '', message: '', onConfirm: null }); setIsExited(true); setTimeout(() => { window.close(); }, 500); }
                });
            };

            // MODIFIKASI: Fungsi menghitung Deduction aktif pada suatu tanggal
            const getActiveDeductionsForDate = (dateStr) => {
                let total = 0;
                if (!settings.deductions) return 0;
                settings.deductions.forEach(d => {
                    if (dateStr >= d.startDate && dateStr <= d.endDate) total += d.nominal;
                });
                return total;
            };

            // Menghitung Saldo Berjalan (termasuk deductions)
            const getBalanceUpTo = (targetDateStr) => {
                let bal = settings.saldoAwal;
                bal += incomes.filter(i => i.date <= targetDateStr).reduce((s,i) => s + i.amount, 0);
                bal -= history.filter(h => h.date <= targetDateStr).reduce((s,h) => s + h.total, 0);
                
                // Tambahan: Loop semua tanggal dari awal untuk menghitung total deduction
                // Simplifikasi: Hitung dedupsi per item
                if (settings.deductions && settings.deductions.length > 0) {
                    settings.deductions.forEach(d => {
                        // Jika start date sebelum targetDate, hitung selisih hari yg valid
                        if (d.startDate <= targetDateStr) {
                            let end = d.endDate < targetDateStr ? d.endDate : targetDateStr;
                            let date1 = new Date(d.startDate);
                            let date2 = new Date(end);
                            // Cek selisih hari
                            let diffTime = Math.abs(date2 - date1);
                            let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 include start
                            if (diffDays > 0) bal -= (d.nominal * diffDays);
                        }
                    });
                }

                agendas.filter(a => a.date <= targetDateStr).forEach(a => {
                    if (a.type === 'masuk') bal += a.amount; else bal -= a.amount; // keluar & pribadi sama-sama mengurangi saldo fisik
                });
                return bal;
            };

            const currentBalance = useMemo(() => getBalanceUpTo(getLocalDateStr()), [incomes, history, agendas, settings]);

            useEffect(() => { localStorage.setItem('fin-cart', JSON.stringify(cart)); }, [cart]);
            useEffect(() => { localStorage.setItem('fin-history', JSON.stringify(history)); }, [history]);
            useEffect(() => { localStorage.setItem('fin-incomes', JSON.stringify(incomes)); }, [incomes]);
            useEffect(() => { localStorage.setItem('fin-agendas', JSON.stringify(agendas)); }, [agendas]);
            useEffect(() => { localStorage.setItem('fin-master', JSON.stringify(itemsDB)); }, [itemsDB]);
            useEffect(() => { localStorage.setItem('fin-settings', JSON.stringify(settings)); }, [settings]);
            useEffect(() => { localStorage.setItem('fin-holidays', JSON.stringify(holidays)); }, [holidays]);

            useEffect(() => { if (isChatOpen) chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chats, isTyping, isChatOpen]);

            useEffect(() => {
                if (showMarketMode || confirmModal.show || reminderModal.show || showSettings) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'auto';
                return () => { document.body.style.overflow = 'auto'; };
            }, [showMarketMode, confirmModal.show, reminderModal.show, showSettings]);

            useEffect(() => {
                const login = async () => {
                    if (isLocalMode) { setUser({ uid: 'local_user', displayName: 'Guest' }); return; }
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (e) { console.error(e); }
                };
                login();
                if (!isLocalMode) return auth.onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (isLocalMode || !user || !paths) return;
                const unsubHistory = db.collection(paths.history).onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHistory(data.sort((a, b) => b.timestamp - a.timestamp));
                });
                return () => unsubHistory();
            }, [user, paths]);

            useEffect(() => {
                if (hasCheckedAgenda.current) return;
                const checkAgendas = () => {
                    const todayStr = getLocalDateStr();
                    const todayObj = new Date(todayStr);
                    const threeDaysObj = new Date(todayObj);
                    threeDaysObj.setDate(todayObj.getDate() + 3);
                    const threeDaysStr = getLocalDateStr(threeDaysObj);

                    const pending = agendas.filter(a => {
                        if (a.isPaid || a.type === 'pribadi') return false; // Abaikan tagihan yg diambil pribadi
                        return a.date >= todayStr && a.date <= threeDaysStr;
                    });

                    if (pending.length > 0) {
                        setReminderModal({ show: true, items: pending });
                        hasCheckedAgenda.current = true;
                    } else if (agendas.length > 0) {
                        hasCheckedAgenda.current = true; 
                    }
                };
                const timer = setTimeout(checkAgendas, 1500); 
                return () => clearTimeout(timer);
            }, [agendas]);

            useEffect(() => {
                if (chats.length === 0) {
                    const todayStr = getLocalDateStr();
                    const todayInc = incomes.filter(i => i.date === todayStr).reduce((s,i) => s + i.amount, 0);
                    let greeting = `Halo Bos! 👋\n\n`;
                    if (todayInc === 0) greeting += `Hari ini belum ada omzet masuk nih, tetap semangat ya bukanya! 💪\n\n`;
                    else greeting += `Mantap, hari ini sudah ada pemasukan **Rp ${formatNumber(todayInc)}**. Gas terus Bos! 🔥\n\n`;
                    setChats([{ id: Date.now(), sender: 'fin', text: greeting, type: 'text' }]);
                }
            }, []);

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!itemName || !qty) return;
                const quantity = parseFloat(qty);
                const total = totalNominal ? parseFloat(totalNominal.toString().replace(/[^0-9]/g, '')) : 0;
                const standardizedName = toTitleCase(itemName.trim());
                
                let newCart = [...cart];
                if (editingId) {
                    newCart = cart.map(i => {
                        if (i.id === editingId) {
                            if (i.actualTotal) return { ...i, name: standardizedName, qty: quantity, unit, actualTotal: total };
                            else return { ...i, name: standardizedName, qty: quantity, unit, total };
                        }
                        return i;
                    });
                    setEditingId(null);
                } else {
                    newCart = [...cart, { id: Date.now(), name: standardizedName, qty: quantity, unit, total, actualTotal: '', isBought: false }];
                }
                setCart(newCart);
                if (!itemsDB.some(i => i.toLowerCase() === standardizedName.toLowerCase())) setItemsDB([...itemsDB, standardizedName]);
                
                setItemName(''); setQty(''); setTotalNominal(''); setShowSuggestions(false);
            };

            const startEdit = (item) => {
                setEditingId(item.id); setItemName(item.name); setQty(item.qty); setUnit(item.unit);

            };

            const updateCartActual = (id, field, value) => {
                setCart(cart.map(item => {
                    if (item.id === id) {
                        let updated = { ...item, [field]: value };
                        if (field === 'actualTotal' && value !== '') updated.isBought = true;
                        return updated;
                    }
                    return item;
                }));
            };

            // MODIFIKASI: Tambah fungsi Quick Add Market Mode
            const handleQuickAddMarket = (e) => {
                e.preventDefault();
                if (!quickAddMarket.name || !quickAddMarket.total) return;
                const standardizedName = toTitleCase(quickAddMarket.name.trim());
                const nominal = parseFloat(quickAddMarket.total.toString().replace(/[^0-9]/g, ''));
                
                const newItem = {
                    id: Date.now(), name: standardizedName, qty: 1, unit: 'Ls', total: nominal, actualTotal: nominal, isBought: true
                };
                setCart([...cart, newItem]);
                setQuickAddMarket({ name: '', total: '' });
                showStatus('Ditambahkan ke daftar!', 'success');
            };

            // MODIFIKASI: Hapus Item Market Mode
            const handleDeleteMarketItem = (id) => {
                setCart(cart.filter(i => i.id !== id));
            };


            const handleSaveNote = async () => {
                if (cart.length === 0) return;
                setIsSaving(true); showStatus('Menyimpan Nota...', 'loading');
                
                const finalCart = cart.map(item => {
                    let finalPrice = item.total;
                    if (item.actualTotal !== undefined && item.actualTotal !== '') {
                        let parsedActual = parseFloat(item.actualTotal.toString().replace(/[^0-9]/g, ''));
                        if (!isNaN(parsedActual)) finalPrice = parsedActual;
                    }
                    return { ...item, total: finalPrice }; 
                });

                const cartTotal = finalCart.reduce((acc, curr) => acc + curr.total, 0);
                const isUpdating = currentNoteId !== null;

                try {
                    const noteData = {
                        id: currentNoteId || (isLocalMode ? 'local-' + Date.now() : db.collection(paths.history).doc().id),
                        date: transactionDate, items: finalCart, total: cartTotal, timestamp: Date.now()
                    };

                    if (isLocalMode) {
                        let localHistory = JSON.parse(localStorage.getItem('fin-history') || '[]');
                        if (currentNoteId) localHistory = localHistory.map(h => h.id === currentNoteId ? noteData : h);
                        else localHistory.push(noteData);
                        setHistory(localHistory.sort((a, b) => b.timestamp - a.timestamp));
                    } else {
                        if (currentNoteId) await db.collection(paths.history).doc(currentNoteId).set(noteData);
                        else { const ref = db.collection(paths.history).doc(); noteData.id = ref.id; await ref.set(noteData); }
                    }

                    setCart([]); setCurrentNoteId(null); setShowMarketMode(false);
                    setIsSaving(false); showStatus(currentNoteId ? 'Arsip Diperbarui!' : 'Belanja Tersimpan!', 'success');
                } catch (e) { console.error(e); setIsSaving(false); showStatus('Gagal Simpan', 'error'); }
            };

            const handleFinalizeMarket = () => {
                const hasEmptyActualPrice = cart.some(item => !item.actualTotal || parseFloat(item.actualTotal.toString().replace(/[^0-9]/g, '')) === 0);
                if (hasEmptyActualPrice) {
                    setConfirmModal({
                        show: true, title: 'Peringatan Harga Asli',
                        message: 'Terdapat barang yang harga aslinya belum diisi. Sistem akan menggunakan harga estimasi untuk barang tersebut. Tetap simpan?',
                        onConfirm: () => { setConfirmModal({ show: false, title: '', message: '', onConfirm: null }); handleSaveNote(); }
                    });
                } else { handleSaveNote(); }
            };

            const triggerClearCart = () => {
                setConfirmModal({ show: true, title: 'Reset Rencana?', message: 'Hapus semua daftar belanja dari rencana ini?', onConfirm: () => { setCart([]); setCurrentNoteId(null); setConfirmModal({...confirmModal, show:false}); showStatus('Direset!', 'success'); }});
            };

            const handleSaveIncome = (e) => {
                e.preventDefault();
                if (!incomeSource || !incomeAmount) { showStatus('Data Belum Lengkap', 'error'); return; }
                const amount = parseFloat(incomeAmount.toString().replace(/[^0-9]/g, ''));
                const stdSource = toTitleCase(incomeSource.trim());
                const newIncome = { id: 'inc-' + Date.now(), date: incomeDate, source: stdSource, amount: amount, timestamp: Date.now() };
                
                setIncomes(prev => [newIncome, ...prev].sort((a,b) => b.timestamp - a.timestamp));
                setIncomeSource(''); setIncomeAmount(''); showStatus('Pemasukan Ditambahkan!', 'success');
            };

            const deleteIncome = (id) => {
                setConfirmModal({ show: true, title: 'Hapus Pemasukan?', message: 'Hapus histori pemasukan ini?', onConfirm: () => { setIncomes(prev => prev.filter(i => i.id !== id)); setConfirmModal({ show: false, title: '', message: '', onConfirm: null }); showStatus('Terhapus!', 'success'); }});
            };

            const handleAddAgenda = (e) => {
                e.preventDefault();
                if(!agendaTitle || !agendaAmount) return;
                const newAg = { id: 'agd-'+Date.now(), date: agendaDate, title: toTitleCase(agendaTitle), amount: parseFloat(agendaAmount.toString().replace(/[^0-9]/g, '')), type: agendaType, isPaid: false };
                setAgendas(prev => [...prev, newAg].sort((a,b) => new Date(a.date) - new Date(b.date)));
                setAgendaTitle(''); setAgendaAmount('');
                showStatus(agendaType === 'pribadi' ? 'Dana Pribadi Disimpan!' : 'Agenda Tersimpan!', 'success');
            };

            const deleteAgenda = (id) => {
                setConfirmModal({ show: true, title: 'Hapus Agenda?', message: 'Hapus agenda ini?', onConfirm: () => { setAgendas(prev => prev.filter(a => a.id !== id)); setConfirmModal({ show: false, title: '', message: '', onConfirm: null }); showStatus('Terhapus!', 'success'); }});
            };

            const toggleHoliday = (dateStr) => {
                setHolidays(prev => { const newHols = prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr]; return newHols; });
            };

            const handleDateChange = (e, setter) => { const val = e.target.value; if (!val) setter(getLocalDateStr()); else setter(val); };

            // MODIFIKASI: Form Pengaturan Potongan Harian
            const addDeduction = () => {
                const newDed = { id: Date.now(), name: '', nominal: 0, startDate: getLocalDateStr(), endDate: getLocalDateStr() };
                setSettings({ ...settings, deductions: [...(settings.deductions||[]), newDed] });
            };
            const updateDeduction = (id, field, value) => {
                setSettings({ ...settings, deductions: settings.deductions.map(d => d.id === id ? {...d, [field]: value} : d) });
            };
            const removeDeduction = (id) => {
                setSettings({ ...settings, deductions: settings.deductions.filter(d => d.id !== id) });
            };

            const renderAgendaSummary = () => {
                const dStr = agendaDate;
                let dayInc = incomes.filter(i => i.date === dStr).reduce((s,i) => s + i.amount, 0);
                let dayExp = history.filter(h => h.date === dStr).reduce((s,h) => s + h.total, 0);
                let agIn = agendas.filter(a => a.date === dStr && a.type === 'masuk').reduce((s,a) => s + a.amount, 0);
                let agOut = agendas.filter(a => a.date === dStr && (a.type === 'keluar' || a.type === 'pribadi')).reduce((s,a) => s + a.amount, 0);
                let dayDed = getActiveDeductionsForDate(dStr);

                let totalIn = dayInc + agIn;
                let totalOut = dayExp + agOut + dayDed;

                let prevDateObj = new Date(dStr);
                prevDateObj.setDate(prevDateObj.getDate() - 1);
                let prevBal = getBalanceUpTo(getLocalDateStr(prevDateObj));
                let currentBal = prevBal + totalIn - totalOut;

                return (
                    <div className="bg-indigo-600 p-5 rounded-[2.5rem] shadow-lg mb-4 text-white relative overflow-hidden border border-indigo-500">
                        <div className="absolute -right-5 -top-5 w-24 h-24 bg-white/10 rounded-full blur-xl"></div>
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-indigo-200 mb-3 border-b border-indigo-400/50 pb-2">Laporan Tgl {new Date(dStr).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'})}</h3>
                        
                        <div className="flex justify-between items-center mb-1 text-[11px]">
                            <span className="font-bold text-indigo-100">Saldo Awal (Pagi)</span>
                            <span className="font-black">Rp {formatNumber(prevBal)}</span>
                        </div>
                        <div className="flex justify-between items-center mb-1 text-[11px]">
                            <span className="font-bold text-green-300">Pemasukan</span>
                            <span className="font-black text-green-300">+{formatNumber(totalIn)}</span>
                        </div>
                        {dayDed > 0 && (

                            <span className="font-black text-base drop-shadow-md">Rp {formatNumber(currentBal)}</span>

            const renderCalendar = () => {
                const parts = agendaDate.split('-'); const year = parseInt(parts[0]); const month = parseInt(parts[1]) - 1;
                const daysInMonth = new Date(year, month + 1, 0).getDate(); const firstDay = new Date(year, month, 1).getDay(); 
                
                let blanks = []; for (let i = 0; i < firstDay; i++) blanks.push(<div key={`blank-${i}`} className="w-8 h-8"></div>);
                
                let daysElements = []; const todayStr = getLocalDateStr();

                for (let d = 1; d <= daysInMonth; d++) {
                    let dObj = new Date(year, month, d); let dStr = getLocalDateStr(dObj);
                    let isPast = dStr < todayStr; let hasAgenda = agendas.some(a => a.date === dStr && !a.isPaid && a.type !== 'pribadi');
                    let isSelected = agendaDate === dStr; let isToday = dStr === todayStr;
                    
                    daysElements.push(
                        <button key={dStr} onClick={() => setAgendaDate(dStr)} className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold relative transition-colors ${isSelected ? 'bg-indigo-600 text-white shadow-md' : (isToday ? 'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700')}`}>
                            {d}
                            {hasAgenda && <span className={`absolute bottom-1 w-1 h-1 rounded-full ${isPast ? 'bg-slate-300 dark:bg-slate-600' : (isSelected ? 'bg-white' : 'bg-red-500')}`}></span>}
                        </button>
                    );
                }
                
                return (
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 mb-4 transition-colors">
                        <div className="flex justify-between items-center mb-3 px-2">
                            <input type="month" value={agendaDate.substring(0,7)} onChange={(e) => setAgendaDate(e.target.value + '-01')} className="font-black text-slate-800 dark:text-slate-100 uppercase tracking-widest text-[11px] bg-transparent outline-none" />
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            {['M','S','S','R','K','J','S'].map((day,i) => <div key={i} className="text-[10px] font-bold text-slate-400 dark:text-slate-500">{day}</div>)}

            const renderMarketMode = () => {

                    let parsed = parseFloat(curr.actualTotal.toString().replace(/[^0-9]/g, ''));
                    return acc + (isNaN(parsed) ? 0 : parsed);
                }, 0);

                return (
                    <div className="fixed inset-0 z-[900] flex justify-center pointer-events-none animate-fadeIn">
                        <div className="w-full max-w-md bg-slate-50 dark:bg-slate-900 flex flex-col pointer-events-auto h-full shadow-2xl transition-colors" style={{ paddingTop: 'env(safe-area-inset-top)', paddingBottom: 'env(safe-area-inset-bottom)' }}>

                                <div>
                                    <h2 className="font-black text-lg flex items-center gap-2"><div className="w-5 h-5"><Icons.ShopBag/></div> Mode Pasar</h2>
                                    <p className="text-[10px] text-indigo-200 uppercase tracking-widest font-bold mt-1">Ubah, tambah, centang. Praktis!</p>
                                </div>
                                <button onClick={() => setShowMarketMode(false)} className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30 transition-colors">
                                    <Icons.X />
                                </button>
                            </div>
                            
                            {/* MODIFIKASI: Form Tambah Dadakan */}
                            <div className="p-3 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm shrink-0 z-10">
                                <form onSubmit={handleQuickAddMarket} className="flex gap-2 items-center">
                                    <input type="text" value={quickAddMarket.name} onChange={e=>setQuickAddMarket({...quickAddMarket, name: e.target.value})} placeholder="Nama Brg..." className="flex-1 min-w-0 p-2.5 bg-slate-100 dark:bg-slate-900 text-xs font-bold rounded-xl outline-none" />
                                    <input type="text" inputMode="numeric" value={formatInputRp(quickAddMarket.total)} onChange={e=>setQuickAddMarket({...quickAddMarket, total: parseInputRp(e.target.value)})} placeholder="Harga Rp" className="w-[90px] p-2.5 bg-slate-100 dark:bg-slate-900 text-xs font-bold rounded-xl outline-none text-right" />
                                    <button type="submit" className="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shrink-0"><div className="w-5 h-5"><Icons.Plus/></div></button>
                                </form>

                            <div className="flex-1 min-h-0 p-3 space-y-2 overflow-y-auto no-scrollbar pb-10 z-10">
                                {cart.length === 0 ? <p className="text-center text-slate-400 font-bold py-10">Daftar belanja kosong.</p> : 
                                cart.map(item => (
                                    <div key={item.id} className={`p-3 rounded-2xl border flex flex-col gap-2 transition-all ${item.isBought ? 'bg-green-50/50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm'}`}>
                                        <div className="flex items-center gap-3">

                                                <div className="w-4 h-4"><Icons.Check/></div>
                                            </button>

                                            <div className="flex-1 min-w-0">
                                                <input type="text" value={item.name} onChange={e=>updateCartActual(item.id, 'name', e.target.value)} className={`bg-transparent w-full font-black text-[13px] uppercase leading-tight mb-0.5 outline-none ${item.isBought ? 'text-slate-500 line-through' : 'text-slate-800 dark:text-slate-100'}`} />
                                                <p className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1">
                                                    <span>{item.qty} {item.unit}</span><span className="opacity-50">•</span><span>Est: Rp {formatNumber(item.total)}</span>

                let todayIncomes = incomes.filter(i => i.date === todayStr);

                const todayInc = todayIncomes.reduce((s,i) => s + i.amount, 0);

                                        let isPast = ag.date < getLocalDateStr();
                                        return (
                                            <div key={ag.id} className={`p-4 rounded-2xl mb-2 flex items-center gap-3 shadow-sm border transition-all ${ag.isPaid || isPast ? 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 opacity-60' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                                <button onClick={() => { if(!isPast && ag.type !== 'pribadi') setAgendas(prev => prev.map(a => a.id === ag.id ? { ...a, isPaid: !a.isPaid } : a)); }} className={`w-8 h-8 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${ag.isPaid || isPast || ag.type==='pribadi' ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 dark:border-slate-600 text-transparent'}`}>
                                                    <div className="w-4 h-4"><Icons.Check /></div>
                                                </button>
                                                <div className="flex-1">
                                                    <p className={`font-black text-xs uppercase ${ag.isPaid || isPast ? 'line-through text-slate-400' : 'text-slate-800 dark:text-slate-200'}`}>{ag.title}</p>
                                                    {ag.type === 'pribadi' && <span className="bg-emerald-100 text-emerald-600 text-[8px] px-1.5 py-0.5 rounded font-bold uppercase mt-1 inline-block">Dana Pribadi</span>}
                                                </div>
                                                <div className="text-right flex flex-col items-end">
                                                    <p className={`font-black text-sm ${ag.type === 'keluar' ? 'text-red-500' : (ag.type === 'pribadi' ? 'text-emerald-500' : 'text-green-500')}`}>{ag.type==='masuk'?'+':'-'} {formatNumber(ag.amount)}</p>
                                                    <button onClick={() => deleteAgenda(ag.id)} className="text-[9px] text-red-300 dark:text-red-400 font-bold uppercase mt-1">Hapus</button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'arsip' && (
                            <div className="flex-1 overflow-y-auto no-scrollbar pb-32 space-y-4">
                                {/* MODIFIKASI: Dashboard HPP di Arsip */}
                                <div className="bg-white dark:bg-slate-800 rounded-[2.5rem] p-5 shadow-sm border border-slate-100 dark:border-slate-700 transition-colors">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="font-extrabold text-slate-800 dark:text-slate-200 uppercase tracking-widest text-[11px] flex items-center gap-2"><div className="w-4 h-4 text-indigo-500"><Icons.Chart/></div> Laporan HPP</h2>
                                        <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-slate-100 dark:bg-slate-900 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-xl text-[10px] font-bold outline-none" />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <div className="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                                            <p className="text-[9px] font-bold text-indigo-500 uppercase">Omzet Bulan Ini</p>
                                            <p className="font-black text-indigo-600 dark:text-indigo-400 text-sm">Rp {formatNumber(arsipOmzetBulanIni)}</p>
                                        </div>
                                        <div className={`p-3 rounded-2xl border ${isHppUnhealthy ? 'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800' : 'bg-slate-50 border-slate-200 dark:bg-slate-900/50 dark:border-slate-700'}`}>
                                            <p className={`text-[9px] font-bold uppercase ${isHppUnhealthy ? 'text-red-500' : 'text-slate-500'}`}>Total HPP Belanja</p>
                                            <p className={`font-black text-sm ${isHppUnhealthy ? 'text-red-600 dark:text-red-400' : 'text-orange-500'}`}>Rp {formatNumber(arsipHPPBulanIni)}</p>
                                        </div>
                                    </div>

                                    {/* Alert HPP */}
                                    {arsipOmzetBulanIni > 0 && (
                                        <div className={`p-3 rounded-xl border flex items-start gap-2 text-[10px] font-medium leading-tight mb-4 ${isHppUnhealthy ? 'bg-red-50 border-red-200 text-red-700 dark:bg-red-900/30 dark:border-red-800 dark:text-red-300' : 'bg-green-50 border-green-200 text-green-700 dark:bg-green-900/30 dark:border-green-800 dark:text-green-300'}`}>
                                            <div className="w-4 h-4 mt-0.5 shrink-0"><Icons.Warn/></div>
                                            <p>
                                                <strong className="font-black block mb-0.5">Rasio HPP: {hppPercentage}% dari Omzet</strong>
                                                {isHppUnhealthy ? '🚨 Awas Boncos! Belanja bahan baku terlalu tinggi (Standar maksimal 50%). Cek ulang porsi resep atau harga pasar.' : '✅ Sehat! Rasio bahan baku aman di bawah 50%. Pertahankan profitnya.'}
                                            </p>
                                        </div>
                                    )}

                                    {/* Chart Sederhana */}
                                    <div className="mt-2 border-t border-slate-100 dark:border-slate-700 pt-3">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-[9px] font-bold text-slate-400 uppercase">Grafik Pengeluaran HPP</span>
                                            <button onClick={()=>setShowArsipChart(!showArsipChart)} className="text-[9px] font-bold text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-1 rounded">{showArsipChart ? 'Sembunyikan' : 'Tampilkan'}</button>
                                        </div>
                                        {showArsipChart && (
                                            <div className="h-24 flex items-end gap-1 overflow-x-auto no-scrollbar pb-1">
                                                {chartData.length === 0 ? <p className="text-xs text-slate-400 italic w-full text-center">Belum ada data</p> : 
                                                chartData.map(c => (
                                                    <div key={c.day} className="flex flex-col items-center flex-1 min-w-[20px] group relative">
                                                        <div className="absolute -top-6 bg-slate-800 text-white text-[8px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 pointer-events-none z-10 whitespace-nowrap">{formatNumber(c.total)}</div>
                                                        <div className="w-full bg-orange-400 rounded-t-sm chart-bar hover:bg-orange-500" style={{ height: `${c.pct}%`, minHeight: '4px' }}></div>
                                                        <span className="text-[8px] text-slate-400 mt-1">{c.day}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* List Riwayat Lama */}
                                <div className="px-2 mt-6">
                                    <h2 className="font-extrabold text-slate-800 dark:text-slate-200 uppercase tracking-widest text-[11px] italic text-slate-400 dark:text-slate-500 mb-3">Rincian Nota Belanja</h2>
                                </div>

                                {filteredHistory.length === 0 ? (
                                    <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-[2.5rem] border border-dashed border-slate-200 dark:border-slate-700 mx-2 transition-colors">
                                        <div className="w-10 h-10 mx-auto text-slate-200 dark:text-slate-600 mb-3"><Icons.Archive /></div>
                                        <p className="text-slate-300 dark:text-slate-500 font-bold uppercase text-[10px] tracking-widest">Kosong</p>
                                    </div>
                                ) : (
                                    filteredHistory.map(note => (
                                        <div key={note.id} className="bg-white dark:bg-slate-800 p-5 rounded-[2.2rem] border border-slate-100 dark:border-slate-700 shadow-sm relative overflow-hidden mb-4 transition-colors">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-[10px] font-black text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-1.5 rounded-full uppercase tracking-widest font-mono italic">
                                                    {new Date(note.date).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})}
                                                </span>
                                                <span className="font-black text-slate-900 dark:text-slate-100 text-sm">Rp {formatNumber(note.total)}</span>
                                            </div>
                                            
                                            <div className="mb-4">
                                                {note.items.map((it, idx) => (
                                                    <div key={idx} className="flex justify-between text-[11px] text-slate-600 dark:text-slate-300">
                                                        <span>{it.name} {it.qty !== 1 ? `(${it.qty})` : ''}</span>
                                                        <span className="font-bold">Rp {formatNumber(it.total)}</span>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="flex gap-2">
                                                <button onClick={() => { setCart(note.items.map(it => ({...it, actualTotal: '', isBought: false}))); setTransactionDate(note.date); setCurrentNoteId(note.id); setActiveTab('plan'); showStatus('Mode Edit Arsip'); }} className="flex-1 bg-slate-900 dark:bg-slate-700 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 shadow-md">DETAIL / EDIT</button>
                                                <button onClick={() => {
                                                    setConfirmModal({ show: true, title: 'Hapus Arsip?', message: 'Data dihapus permanen?', onConfirm: async () => {
                                                        setConfirmModal({ ...confirmModal, show: false }); showStatus('Menghapus...', 'loading');
                                                        try {
                                                            if (isLocalMode) setHistory(prev => prev.filter(h => h.id !== note.id));
                                                            else if (user && paths) await db.collection(paths.history).doc(note.id).delete();
                                                            showStatus('Arsip Dihapus!', 'success');
                                                        } catch (e) { showStatus('Gagal Menghapus', 'error'); }
                                                    }});
                                                }} className="w-12 bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 rounded-xl flex justify-center items-center hover:bg-red-100"><div className="w-5 h-5"><Icons.Trash /></div></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {showMarketMode && renderMarketMode()}
                    </main>

                    <div 
                        className={`fixed z-[550] transition-opacity duration-300 ${isChatOpen || showMarketMode ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                        style={{ right: `${finPos.right}px`, bottom: `${finPos.bottom}px`, touchAction: 'none' }}
                        onPointerDown={handleFinPointerDown} onPointerMove={handleFinPointerMove} onPointerUp={handleFinPointerUp} onPointerCancel={handleFinPointerUp}
                    >
                        <button onClick={handleFinClick} className="relative bg-indigo-600 text-white p-4 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] border border-indigo-400 active:scale-95 transition-transform">
                            <div className="w-6 h-6 pointer-events-none"><Icons.MessageCircle /></div>
                            {hasNewFinAlert && <span className="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full animate-pulse pointer-events-none"></span>}
                        </button>
                    </div>

                    <div className={`fixed left-1/2 -translate-x-1/2 z-[160] transition-all duration-500 ease-in-out ${showNav || showMarketMode ? 'bottom-28 opacity-0 pointer-events-none translate-y-10' : 'bottom-6 opacity-100 translate-y-0'}`}>
                        <button onClick={() => setShowNav(true)} className="bg-slate-900/90 dark:bg-slate-800/90 backdrop-blur-md text-white px-5 py-3 rounded-full shadow-2xl border border-slate-700/50 flex items-center gap-2 hover:bg-slate-800 transition-colors">
                            <div className="w-5 h-5"><Icons.ChevronUp /></div>
                            <span className="text-[11px] font-black uppercase tracking-widest">Menu Utama</span>
                        </button>
                    </div>

                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] glass-nav rounded-[2.5rem] flex justify-between px-2 py-2 z-[150] shadow-2xl border border-slate-700/50 transition-all duration-500 ease-in-out ${showNav && !showMarketMode ? 'bottom-6 translate-y-0 opacity-100' : '-bottom-32 translate-y-full opacity-0 pointer-events-none'}`}>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2">
                            <button onClick={() => setShowNav(false)} className="w-16 h-5 bg-slate-900/95 dark:bg-slate-800/95 backdrop-blur-md rounded-t-full flex items-center justify-center border-t border-x border-slate-700/50 dark:border-slate-600/50 text-slate-400 hover:text-white cursor-pointer group shadow-lg">
                                <div className="w-4 h-4 group-hover:translate-y-0.5 transition-transform"><Icons.ChevronDown /></div>
                            </button>
                        </div>
                        <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Bot /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">C-Flow</span>
                        </button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'plan' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.ShopBag /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Belanja</span>
                        </button>
                        <button onClick={() => setActiveTab('income')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'income' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Wallet /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Income</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'agenda' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Calendar /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Operasi</span>
                        </button>
                        <button onClick={() => setActiveTab('arsip')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'arsip' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Archive /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Arsip</span>
                        </button>
                    </nav>

                    {renderFloatingFin()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
