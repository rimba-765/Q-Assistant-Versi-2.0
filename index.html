    <!-- Script Generate Logo PNG Kualitas Tinggi Otomatis -->
    <script>
        (function() {
            var canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#4f46e5';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.fillStyle = 'white';
            ctx.font = '900 380px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 20;
            
            ctx.strokeText('Q', 256, 285);
            ctx.fillText('Q', 256, 285);
            
            var dataURL = canvas.toDataURL('image/png');
            
            var appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = dataURL;
            document.head.appendChild(appleIcon);
            
            var stdIcon = document.createElement('link');
            stdIcon.rel = 'icon';
            stdIcon.type = 'image/png';
            stdIcon.href = dataURL;
            document.head.appendChild(stdIcon);
        })();
    </script>

                        </div>
                        <div className="flex justify-between items-center">
                            <span className="text-[10px] font-black uppercase tracking-widest bg-white/20 px-2 py-1 rounded-md">Saldo Akhir</span>

                        </div>

                );
            };

            const renderCalendar = () => {
                const parts = agendaDate.split('-');
                const year = parseInt(parts[0]);
                const month = parseInt(parts[1]) - 1;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay(); 
                
                let blanks = [];
                for (let i = 0; i < firstDay; i++) blanks.push(<div key={`blank-${i}`} className="w-8 h-8"></div>);
                
                let daysElements = [];
                const todayStr = getLocalDateStr();

                for (let d = 1; d <= daysInMonth; d++) {
                    let dObj = new Date(year, month, d);
                    let dStr = getLocalDateStr(dObj);
                    
                    let isPast = dStr < todayStr;
                    let hasAgenda = agendas.some(a => a.date === dStr && !a.isPaid && a.type === 'keluar');
                    let isSelected = agendaDate === dStr;
                    let isToday = dStr === todayStr;
                    
                    daysElements.push(
                        <button key={dStr} onClick={() => setAgendaDate(dStr)} className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold relative transition-colors ${isSelected ? 'bg-indigo-600 text-white shadow-md' : (isToday ? 'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700')}`}>
                            {d}
                            {hasAgenda && <span className={`absolute bottom-1 w-1 h-1 rounded-full ${isPast ? 'bg-slate-300 dark:bg-slate-600' : (isSelected ? 'bg-white' : 'bg-red-500')}`}></span>}
                        </button>

                return (
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 mb-4 transition-colors">
                        <div className="flex justify-between items-center mb-3 px-2">

                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            {['M','S','S','R','K','J','S'].map((day,i) => <div key={i} className="text-[10px] font-bold text-slate-400 dark:text-slate-500">{day}</div>)}

                        <div className="grid grid-cols-7 gap-1 justify-items-center">

            };

            const handleMarketModeAdd = (e) => {
                e.preventDefault();
                if (!marketNewItem.name || !marketNewItem.qty) return;
                
                const quantity = parseFloat(marketNewItem.qty);
                const actualTotal = marketNewItem.actualTotal ? parseFloat(marketNewItem.actualTotal.toString().replace(/[^0-9]/g, '')) : '';
                const standardizedName = toTitleCase(marketNewItem.name.trim());
                
                const newItem = {
                    id: Date.now(),
                    name: standardizedName,
                    qty: quantity,
                    unit: marketNewItem.unit,

                    actualTotal: actualTotal,
                    isBought: actualTotal !== ''
                };

                setCart([...cart, newItem]);
                if (!itemsDB.some(i => i.toLowerCase() === standardizedName.toLowerCase())) setItemsDB([...itemsDB, standardizedName]);
                
                setMarketNewItem({ name: '', qty: 1, unit: 'Kg', total: '', actualTotal: '' });

            const renderMarketMode = () => {
                const totalEstimasi = cart.reduce((acc, curr) => acc + curr.total, 0);
                const totalRealita = cart.reduce((acc, curr) => {
                    let parsed = parseFloat(curr.actualTotal.toString().replace(/[^0-9]/g, ''));
                    return acc + (isNaN(parsed) ? 0 : parsed);
                }, 0);
                
                // Kalkulasi Sisa Saldo
                const cashNum = parseFloat(marketCash) || 0;

                return (
                    <div className="fixed inset-0 z-[900] flex justify-center pointer-events-none animate-fadeIn">

                                <div>

                                    <Icons.X />

                            {/* FITUR BARU: Input Saldo Bawaan */}
                            <div className="bg-indigo-700/90 px-4 py-2.5 flex items-center justify-between shadow-inner shrink-0 z-10 border-b border-indigo-800/50">
                                <span className="text-indigo-100 text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5"><div className="w-3.5 h-3.5"><Icons.Wallet/></div> Saldo Tersedia</span>
                                <input type="text" inputMode="numeric" value={formatInputRp(marketCash)} onChange={e => setMarketCash(parseInputRp(e.target.value))} placeholder="Isi Saldo (Rp)" className="w-32 bg-indigo-900/50 text-white placeholder-indigo-300 text-right font-black text-[11px] outline-none px-2.5 py-1.5 rounded-lg border border-indigo-500/50 focus:border-indigo-300 transition-colors" />
                            </div>

                            <div className="flex-1 min-h-0 p-2 space-y-1.5 overflow-y-auto no-scrollbar pb-2 z-10">
                                {cart.length === 0 ? <p className="text-center text-slate-400 font-bold py-10">Daftar belanja masih kosong.</p> : 
                                cart.map(item => (
                                    <div key={item.id} className={`p-2 rounded-xl border flex items-center gap-1.5 transition-all ${item.isBought ? 'bg-green-50/50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm'}`}>
                                        
                                        <button onClick={() => updateCartActual(item.id, 'isBought', !item.isBought)} className={`w-6 h-6 rounded-full shrink-0 flex items-center justify-center border transition-colors shadow-sm ${item.isBought ? 'bg-green-500 border-green-500 text-white' : 'bg-slate-100 dark:bg-slate-900 border-slate-300 dark:border-slate-600 text-transparent'}`}>

                                            />
                                            <span className="text-[8px] font-bold text-slate-400 uppercase mt-0.5">Est: Rp {formatNumber(item.total)}</span>
                                        </div>

                                        <div className="flex items-center bg-slate-100 dark:bg-slate-900 rounded-lg overflow-hidden shrink-0 border border-slate-200 dark:border-slate-700">
                                            <input 
                                                type="number" step="any" value={item.qty} 
                                                onChange={(e) => updateCartActual(item.id, 'qty', e.target.value)}
                                                className={`w-8 bg-transparent outline-none text-center text-[11px] font-black py-1 ${item.isBought ? 'text-slate-500' : 'text-slate-800 dark:text-slate-100'}`}
                                            />
                                            <select 
                                                value={item.unit} 
                                                onChange={(e) => updateCartActual(item.id, 'unit', e.target.value)}
                                                className={`w-[42px] bg-slate-200 dark:bg-slate-800 outline-none text-[9px] font-black uppercase py-1.5 appearance-none text-center ${item.isBought ? 'text-slate-500' : 'text-slate-700 dark:text-slate-300'}`}

                                        <input type="text" inputMode="numeric" value={formatInputRp(item.actualTotal)} onChange={(e) => updateCartActual(item.id, 'actualTotal', parseInputRp(e.target.value))} placeholder="H. Asli" className={`w-[65px] px-1.5 py-1.5 rounded-lg text-[10px] font-black outline-none focus:ring-2 focus:ring-green-400 transition-colors text-right shrink-0 ${item.isBought ? 'bg-white dark:bg-slate-900 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800' : 'bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 border border-slate-200 dark:border-slate-700'}`} />
                                        
                                        <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="w-5 h-5 shrink-0 flex items-center justify-center text-red-400 hover:text-red-500 transition-colors">
                                            <Icons.Trash/>
                                        </button>
                                    </div>
                                ))}
                            </div>

                            {/* FITUR BARU: Tambah Item Mini Form di Mode Pasar (+Dropdown Satuan) */}
                            <form onSubmit={handleMarketModeAdd} className="p-2.5 bg-slate-100 dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 shrink-0 z-10 flex gap-1.5 items-center">
                                <input type="text" value={marketNewItem.name} onChange={e => setMarketNewItem({...marketNewItem, name: e.target.value})} placeholder="Tambah brg..." className="flex-1 min-w-[50px] p-2 rounded-lg text-[10px] font-bold bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 outline-none uppercase" />
                                
                                <div className="flex bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg overflow-hidden shrink-0">
                                    <input type="number" step="any" value={marketNewItem.qty} onChange={e => setMarketNewItem({...marketNewItem, qty: e.target.value})} placeholder="Qty" className="w-9 p-2 text-[10px] font-bold text-center bg-transparent outline-none" />
                                    <select value={marketNewItem.unit} onChange={e => setMarketNewItem({...marketNewItem, unit: e.target.value})} className="w-10 bg-slate-100 dark:bg-slate-800 text-[9px] font-black uppercase text-center appearance-none outline-none border-l border-slate-200 dark:border-slate-700">
                                        {commonUnits.map(u => <option key={u} value={u}>{u}</option>)}
                                    </select>
                                </div>

                                <input type="text" inputMode="numeric" value={formatInputRp(marketNewItem.actualTotal)} onChange={e => setMarketNewItem({...marketNewItem, actualTotal: parseInputRp(e.target.value)})} placeholder="H.Asli" className="w-[60px] p-2 rounded-lg text-[10px] font-bold text-right bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 outline-none" />
                                <button type="submit" className="bg-indigo-600 text-white p-2.5 rounded-lg shadow-sm hover:bg-indigo-700 shrink-0"><div className="w-3.5 h-3.5"><Icons.Plus /></div></button>
                            </form>

                            {/* Footer Market Mode (Total & Action) */}
                            <div className="bg-slate-900 p-4 rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(0,0,0,0.2)] shrink-0 z-20 relative mt-auto">
                                <div className="flex justify-between items-start mb-4 px-2">
                                    <div className="space-y-1">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">Total Estimasi</p>
                                        <p className="text-sm font-black text-slate-300">Rp {formatNumber(totalEstimasi)}</p>
                                    </div>
                                    <div className="text-right space-y-1">
                                        <p className="text-[10px] font-bold text-green-400 uppercase tracking-widest">Total Realita</p>
                                        <p className="text-lg font-black text-green-500 leading-none mt-0.5">Rp {formatNumber(totalRealita || 0)}</p>
                                        
                                        {/* Indikator Sisa Uang Kalkulator */}
                                        {cashNum > 0 && (
                                            <div className={`mt-1.5 pt-1.5 border-t ${isSisaMinus ? 'border-red-500/50' : 'border-slate-700'}`}>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{isSisaMinus ? 'Kurang Uang' : 'Sisa Uang'}</p>
                                                <p className={`text-[13px] font-black mt-0.5 ${isSisaMinus ? 'text-red-500' : 'text-indigo-400'}`}>Rp {formatNumber(Math.abs(sisaCash))}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowMarketMode(false)} className="w-[40%] py-3.5 bg-slate-700 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg hover:bg-slate-600 active:scale-[0.98] transition-all">
                                        SIMPAN SAJA
                                    </button>
                                    <button onClick={handleFinalizeMarket} disabled={isSaving || cart.length===0} className="w-[60%] py-3.5 bg-green-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:bg-green-600 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-1">
                                        ✅ POTONG KAS
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const getDashboardData = () => {
                const todayStr = getLocalDateStr();
                
                const yesterdayObj = new Date();
                yesterdayObj.setDate(yesterdayObj.getDate() - 1);
                const yesterdayStr = getLocalDateStr(yesterdayObj);
                
                let todayIncomes = incomes.filter(i => i.date === todayStr);
                if (todayIncomes.length === 0) {
                    todayIncomes = incomes.filter(i => i.date === yesterdayStr);
                }
                const todayInc = todayIncomes.reduce((s,i) => s + i.amount, 0);

                const todayExp = history.filter(h => h.date === todayStr).reduce((s,h) => s + h.total, 0);

                const [yearStr, monthStr] = dashboardMonth.split('-');
                const year = parseInt(yearStr);
                const month = parseInt(monthStr) - 1;
                const startDate = new Date(year, month, 1);
                const endDate = new Date(year, month + 1, 0);

                let reportDays = [];
                let startStr = getLocalDateStr(startDate);
                
                let prevDateObj = new Date(startDate);
                prevDateObj.setDate(prevDateObj.getDate() - 1);
                let runningBalance = getBalanceUpTo(getLocalDateStr(prevDateObj));

                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    let dStr = getLocalDateStr(d);
                    let isFuture = dStr > todayStr;
                    let isToday = dStr === todayStr;

                    let dayIncomes = incomes.filter(i => i.date === dStr);
                    let dayExpenses = history.filter(h => h.date === dStr);
                    let dayAgendas = agendas.filter(a => a.date === dStr);

                    let actualInc = dayIncomes.reduce((s, i) => s + i.amount, 0);
                    let actualExp = dayExpenses.reduce((s, h) => s + h.total, 0);
                    let agendaIn = dayAgendas.filter(a=>a.type==='masuk').reduce((s,a) => s + a.amount, 0);
                    let agendaOut = dayAgendas.filter(a=>a.type==='keluar' || a.type==='pribadi').reduce((s,a) => s + a.amount, 0);
                    
                    let dedOut = getActiveDeductionsTotal(dStr);

                    let isHoliday = holidays.includes(dStr);

                    let baseIn = (isFuture && !isHoliday) ? settings.targetOmzet : actualInc;
                    let dailyIn = baseIn + agendaIn;

                    let baseOut = (isFuture && !isHoliday) ? settings.maxBelanja : actualExp;
                    let dailyOut = baseOut + agendaOut + dedOut;

                    let saldoPagi = runningBalance;
                    runningBalance = saldoPagi + dailyIn - dailyOut;

                    reportDays.push({
                        date: dStr,
                        displayDate: d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                        isToday, isFuture, isHoliday, saldoPagi, dailyIn, dailyOut, saldoAkhir: runningBalance,
                        hasData: actualInc > 0 || actualExp > 0 || agendaIn > 0 || agendaOut > 0 || dedOut > 0,
                        details: { incomes: dayIncomes, expenses: dayExpenses, agendas: dayAgendas, deductions: dedOut }
                    });
                }

                return { todayInc, todayExp, reportDays };
            };

            // LOGIKA LAPORAN BULANAN
            const getLaporanData = (month) => {
                const hists = history.filter(h => h.date.startsWith(month));
                const incs = incomes.filter(i => i.date.startsWith(month));
                const ags = agendas.filter(a => a.date.startsWith(month));

                const [yearStr, monthStr] = month.split('-');
                const year = parseInt(yearStr);
                const m = parseInt(monthStr) - 1;
                const daysInMonth = new Date(year, m + 1, 0).getDate();
                
                let totalDeductions = 0;
                let deductionDetails = {};
                for (let d = 1; d <= daysInMonth; d++) {
                    let dObj = new Date(year, m, d);
                    let dStr = getLocalDateStr(dObj);
                    deductions.forEach(ded => {
                        if (dStr >= ded.startDate && dStr <= ded.endDate) {
                            totalDeductions += ded.amount;
                            deductionDetails[ded.name] = (deductionDetails[ded.name] || 0) + ded.amount;
                        }
                    });
                }

                // Pemisahan Penjualan dan Hutang/Lainnya
                const pendapatanPenjualan = incs.filter(i => i.category !== 'Lainnya').reduce((s,i) => s + i.amount, 0);
                const pendapatanLainnya = incs.filter(i => i.category === 'Lainnya').reduce((s,i) => s + i.amount, 0) + ags.filter(a => a.type === 'masuk').reduce((s,a) => s + a.amount, 0);
                
                const rincianPenjualan = {};
                incs.filter(i => i.category !== 'Lainnya').forEach(i => {
                    rincianPenjualan[i.source] = (rincianPenjualan[i.source] || 0) + i.amount;
                });

                const hppTotal = hists.reduce((s,h) => s + h.total, 0);
                const oprTotal = ags.filter(a => a.type === 'keluar').reduce((s,a) => s + a.amount, 0);
                const pribadiTotal = ags.filter(a => a.type === 'pribadi').reduce((s,a) => s + a.amount, 0);

                let itemMap = {};
                hists.forEach(h => h.items.forEach(it => { itemMap[it.name] = (itemMap[it.name] || 0) + it.total; }));
                const topBelanja = Object.entries(itemMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>({name:x[0], total:x[1]}));

                let oprMap = {};
                ags.filter(a => a.type === 'keluar').forEach(a => { oprMap[a.title] = (oprMap[a.title] || 0) + a.amount; });
                const topOpr = Object.entries(oprMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>({name:x[0], total:x[1]}));

                const labaKotor = pendapatanPenjualan - hppTotal;
                const labaBersih = (pendapatanPenjualan + pendapatanLainnya) - (hppTotal + oprTotal + totalDeductions);
                
                const targetOmzet = settings.targetOmzet * daysInMonth;
                const omzetTercapai = pendapatanPenjualan;
                const pctTarget = targetOmzet > 0 ? (omzetTercapai / targetOmzet) * 100 : 0;
                const cogsRatio = omzetTercapai > 0 ? (hppTotal / omzetTercapai) * 100 : 0;
                const bep = hppTotal + oprTotal + totalDeductions;

                // DATA TAMBAHAN UNTUK PDF
                const totalTransaksiPenjualan = incs.filter(i => i.category !== 'Lainnya').length;
                const totalTransaksiBelanja = hists.length;
                const rataRataPenjualanHarian = pendapatanPenjualan / daysInMonth;
                const rataRataBelanjaHarian = hppTotal / daysInMonth;
                
                const hutangLunas = ags.filter(a => a.type === 'keluar' && (a.isPaid || a.date < getLocalDateStr())).map(a => ({...a, status: 'Lunas'}));
                const hutangBelum = ags.filter(a => a.type === 'keluar' && !a.isPaid && a.date >= getLocalDateStr()).map(a => ({...a, status: 'Belum Lunas'}));
                const semuaTagihan = [...hutangBelum, ...hutangLunas];

                return { 
                    month, timestamp: Date.now(),
                    pendapatanPenjualan, pendapatanLainnya, rincianPenjualan,
                    hppTotal, oprTotal, totalDeductions, deductionDetails, pribadiTotal,
                    labaKotor, labaBersih, topBelanja, topOpr,
                    targetOmzet, omzetTercapai, pctTarget, cogsRatio, bep,
                    totalTransaksiPenjualan, totalTransaksiBelanja, rataRataPenjualanHarian, rataRataBelanjaHarian, semuaTagihan
                };
            };

            const downloadPDF = async () => {
                const printArea = document.getElementById('report-print-area');
                if(!printArea) return;
                showStatus('Menyiapkan PDF (Bisa memakan waktu)...', 'loading');
                
                // Styling sementara untuk print
                const originalStyle = printArea.style.cssText;
                printArea.style.cssText = "background-color: white; padding: 30px; color: black; border: none; box-shadow: none; max-width: 800px; margin: 0 auto;";
                
                try {
                    const canvas = await html2canvas(printArea, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const imgHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    let heightLeft = imgHeight;
                    let position = 0;

                    // Halaman Pertama
                    pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
                    heightLeft -= pdfHeight;

                    // Loop untuk multipage (Jika laporan panjang dan terpotong ke halaman berikutnya)
                    while (heightLeft > 0) {
                        position = position - pdfHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
                        heightLeft -= pdfHeight;
                    }
                    
                    pdf.save(`Laporan_Fin_${reportMonth}.pdf`);
                    showStatus('PDF Berhasil Diunduh!', 'success');
                } catch (error) {
                    showStatus('Gagal membuat PDF. Coba screenshot manual.', 'error');
                } finally {
                    printArea.style.cssText = originalStyle;
                }
            };

            const handleSimpanArsipLaporan = () => {
                if(!reportDataState) return;
                const existing = reportArchives.findIndex(r => r.month === reportDataState.month);
                let newArchives = [...reportArchives];
                if (existing >= 0) newArchives[existing] = reportDataState;
                else newArchives.push(reportDataState);
                
                setReportArchives(newArchives);
                showStatus('Laporan Resmi Diarsipkan!', 'success');
            };

            const hapusArsipLaporan = (month) => {
                setConfirmModal({
                    show: true, title: 'Hapus Arsip Laporan?', message: `Yakin ingin menghapus arsip bulan ${month}?`,
                    onConfirm: () => {
                        setReportArchives(reportArchives.filter(r => r.month !== month));

[DATA]
Omzet Penjualan Murni: Rp${d.pendapatanPenjualan}
HPP (Belanja Bahan): Rp${d.hppTotal}
Biaya Operasional: Rp${d.oprTotal}

Tugas Anda (Jawab langsung dengan format Markdown yang rapi tanpa JSON wrap, tanpa basa-basi):
1. **Evaluasi Profitabilitas**: Analisa COGS, Laba Bersih, dan Pencapaian Target. Apakah sehat atau bocor?

3. **Rekomendasi Action Plan Bulan Depan**: Berikan 3 poin konkrit strategi (misal: naikkan margin produk X, pangkas biaya Y, dsb).`;
                
                var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
                const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.3 } };

                            newArr[existingIdx] = { ...newArr[existingIdx], aiInsight: insightText };
                            return newArr;
                        }
                        return prev;

            // FITUR BARU: RENDER MODAL HPP ANALISIS (TANPA RESEP)
            const renderHppAnalysis = () => {
                const handleHppDateChange = (e) => {
                    const d = e.target.value;
                    setHppDate(d);
                    const existing = dailyStocks.find(s => s.date === d);
                    setHppStockValue(existing ? existing.totalValue : '');
                    setHppAiInsight(''); // Reset insight saat pindah tanggal
                };

                const handleSaveStock = () => {
                    const val = parseFloat(hppStockValue.toString().replace(/[^0-9]/g, '')) || 0;
                    const newStocks = [...dailyStocks.filter(s => s.date !== hppDate), { date: hppDate, totalValue: val }];
                    setDailyStocks(newStocks);
                    showStatus('Stok Akhir Disimpan!', 'success');
                };

                const handleSaveMenu = (e) => {
                    e.preventDefault();
                    if(!menuForm.name) return;
                    const newM = {
                        id: Date.now(),
                        name: menuForm.name,
                        prices: menuForm.prices || {}
                    };
                    setMenus([...menus, newM]);
                    setMenuForm({ name: '', prices: {} });
                    showStatus('Menu Tersimpan', 'success');
                };

                const handleAddChannel = (e) => {
                    e.preventDefault();
                    const stdName = toTitleCase(newChannelName.trim());
                    if(stdName && !salesChannels.includes(stdName)){
                        setSalesChannels([...salesChannels, stdName]);
                        setNewChannelName('');
                        showStatus('Channel Jualan Ditambahkan', 'success');
                    }
                };

                // MATH LOGIC - MENGUMPULKAN DATA UNTUK AI (LAYER 2)
                const yDate = new Date(hppDate); yDate.setDate(yDate.getDate() - 1);
                const yStr = getLocalDateStr(yDate);

                const yStock = dailyStocks.find(s => s.date === yStr)?.totalValue || 0;
                const tStockObj = dailyStocks.find(s => s.date === hppDate);
                const tStock = tStockObj ? tStockObj.totalValue : 0;
                
                const tBelanja = history.filter(h => h.date === hppDate).reduce((s, h) => s + h.total, 0);
                const realHpp = Math.max(0, yStock + tBelanja - tStock); 

                // Income calculations
                const incs = incomes.filter(i => i.date === hppDate && i.category === 'Penjualan');
                let totalNet = 0;
                let totalGross = 0;
                let totalPlatformFee = 0;
                let channelSales = {};

                incs.forEach(i => {
                    totalNet += i.amount;
                    let gross = i.grossAmount || i.amount;
                    totalGross += gross;
                    totalPlatformFee += (gross - i.amount);

                    if(!channelSales[i.source]) channelSales[i.source] = { net: 0, gross: 0, count: 0 };
                    channelSales[i.source].net += i.amount;
                    channelSales[i.source].gross += gross;
                    channelSales[i.source].count++;
                });

                const globalHppRatio = totalGross > 0 ? (realHpp / totalGross) * 100 : 0;
                const globalFeeRatio = totalGross > 0 ? (totalPlatformFee / totalGross) * 100 : 0;

                // ====================================================
                // LOGIKA AUTO-INSIGHT & SISTEM KESEHATAN (TANPA AI)
                // ====================================================
                let systemHealth = 'SEHAT';
                let healthColor = 'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-400 border-green-200 dark:border-green-800';
                let healthIcon = <Icons.Check />;

                if (globalHppRatio > 55 || globalFeeRatio > 25) {
                    systemHealth = 'KRITIS (BONCOS)';
                    healthColor = 'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-400 border-red-200 dark:border-red-800';
                    healthIcon = <Icons.Warn />;
                } else if (globalHppRatio > 45 || globalFeeRatio > 15) {
                    systemHealth = 'WASPADA (TIPIS)';
                    healthColor = 'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-400 border-amber-200 dark:border-amber-800';
                    healthIcon = <Icons.Info />;
                }

                const autoAlerts = [];

                // Cek 1: HPP / Bahan Baku
                if (globalHppRatio > 50) {
                    autoAlerts.push({
                        title: 'HPP Terlalu Tinggi / Margin Tipis',
                        desc: `Biaya bahan baku Anda tembus ${globalHppRatio.toFixed(1)}% dari Pemasukan Kotor. Idealnya harus di bawah 50%.`,
                        solution: 'Evaluasi ulang porsi makanan atau naikkan harga jual secara keseluruhan sekitar 10-15%. Cek juga apakah ada bahan mentah yang terbuang sia-sia (waste) di hari ini.'
                    });
                }

                // Cek 2: Biaya Platform / Admin
                if (globalFeeRatio > 20) {
                    autoAlerts.push({
                        title: 'Kebocoran Biaya Platform / Iklan',
                        desc: `Potongan aplikasi mengambil ${globalFeeRatio.toFixed(1)}% dari Omzet. Potongan sebesar ini akan sangat mematikan laba bersih Anda.`,
                        solution: 'Pastikan semua menu di Gofood/Grab/Shopee sudah dinaikkan harganya (markup) minimal 20-25% dari harga offline. Kurangi promo berbayar jika omzet sedang turun.'
                    });
                }

                // Cek 3: Analisa Harga Menu vs Channel (Harga terlalu murah)
                let badMenus = [];
                menus.forEach(m => {
                    const offlinePrice = m.prices?.['Offline'] || m.priceOffline || 0;
                    if (offlinePrice > 0) {
                        salesChannels.filter(c => c !== 'Offline').forEach(ch => {
                            const onlinePrice = m.prices?.[ch] || m['price'+ch] || 0;
                            // Jika harga online diset, dan selisihnya sangat tipis (di bawah 5% dari harga offline)
                            if (onlinePrice > 0 && onlinePrice <= offlinePrice * 1.05) {
                                badMenus.push(`${m.name} di merchant ${ch}`);
                            }
                        });
                    }

            const handleFinPointerDown = (e) => {

                    y: e.clientY || (e.touches && e.touches[0].clientY) || 0, 
                    right: finPos.right, 
                    bottom: finPos.bottom 
                };
                if (e.target.setPointerCapture && e.pointerId) e.target.setPointerCapture(e.pointerId);
            };

            const handleFinPointerMove = (e) => {
                if (!isDraggingFin.current) return;
                
                const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
                const clientY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
                
                const dx = finStartPos.current.x - clientX;
                const dy = finStartPos.current.y - clientY;
                
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) setHasDragged(true);

                setFinPos({
                    right: Math.max(0, Math.min(window.innerWidth - 60, finStartPos.current.right + dx)),
                    bottom: Math.max(0, Math.min(window.innerHeight - 60, finStartPos.current.bottom + dy))
                });
            };

                isDraggingFin.current = false;
                if (e.target.releasePointerCapture && e.pointerId) e.target.releasePointerCapture(e.pointerId);

            const filteredIncomes = incomes.filter(i => i.date.startsWith(filterMonth))

            const filteredHistoryBelanja = history.filter(h => h.date.startsWith(belanjaMonth))
                .sort((a, b) => {
                    if (a.date === b.date) return b.timestamp - a.timestamp;
                    return new Date(b.date) - new Date(a.date);
                });

            const incomeSummary = filteredIncomes.reduce((acc, curr) => {
                acc[curr.source] = (acc[curr.source] || 0) + curr.amount;
                return acc;
            }, {});
            const totalFilteredIncome = filteredIncomes.reduce((s, i) => s + i.amount, 0);

            // FITUR BARU 4: Helper untuk Dashboard Belanja
            const getBelanjaDashboardData = (endDateStr) => {
                const endDateObj = new Date(endDateStr);
                const currentMonth = endDateStr.substring(0, 7);
                
                // Omzet bulan ini
                const monthlyOmzet = incomes.filter(i => i.date.startsWith(currentMonth)).reduce((s,i) => s + i.amount, 0);
                // HPP (Belanja) bulan ini
                const monthlyHPP = history.filter(h => h.date.startsWith(currentMonth)).reduce((s,h) => s + h.total, 0);
                
                // Cari hari dengan pengeluaran terbesar di bulan ini
                let highestDay = { date: '', total: 0 };
                let dailyHPP = {};
                history.filter(h => h.date.startsWith(currentMonth)).forEach(h => {
                    dailyHPP[h.date] = (dailyHPP[h.date] || 0) + h.total;
                    if(dailyHPP[h.date] > highestDay.total) {
                        highestDay = { date: h.date, total: dailyHPP[h.date] };
                    }
                });

                // Rasio HPP
                const hppRatio = monthlyOmzet > 0 ? (monthlyHPP / monthlyOmzet) * 100 : 0;
                
                // Data chart 7 hari terakhir dari filter tanggal
                let last7Days = [];
                let max7DayTotal = 0;
                for(let i=6; i>=0; i--) {
                    let d = new Date(endDateObj);
                    d.setDate(d.getDate() - i);
                    let dStr = getLocalDateStr(d);
                    let t = history.filter(h => h.date === dStr).reduce((s,h) => s + h.total, 0);
                    last7Days.push({ date: dStr, total: t, label: d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}) });
                    if(t > max7DayTotal) max7DayTotal = t;
                }

                return { monthlyOmzet, monthlyHPP, highestDay, hppRatio, last7Days, max7DayTotal, currentMonth };

                                            <div className="flex justify-between items-center mb-3">
                                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                                    <div className="w-4 h-4 text-orange-500"><Icons.Chart /></div> Rekap Bulan {new Date(agendaDate).toLocaleDateString('id-ID', {month:'long', year:'numeric'})}
                                                </h3>
                                                <button onClick={() => setShowMonthlyAgenda(!showMonthlyAgenda)} className="text-[9px] font-bold bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg text-slate-500 hover:text-indigo-500 transition-colors">
                                                    {showMonthlyAgenda ? 'TUTUP DETAIL' : 'LIHAT DETAIL'}
                                                </button>
                                            </div>

                                            {/* PROGRESS BAR TAGIHAN */}
                                            <div className="mb-4">
                                                <div className="flex justify-between text-[10px] font-bold mb-1.5 uppercase tracking-widest">
                                                    <span className="text-slate-500">Status Pembayaran</span>
                                                    <span className={billProgressPct === 100 ? 'text-green-500' : 'text-indigo-500'}>{billProgressPct}% Lunas</span>
                                                </div>
                                                <div className="w-full h-2.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                                    <div 
                                                        className={`h-full rounded-full transition-all duration-1000 ${billProgressPct === 100 ? 'bg-green-500' : 'bg-indigo-500'}`} 
                                                        style={{ width: `${billProgressPct}%` }}
                                                    ></div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 mb-2">
                                                <div className="bg-orange-50 dark:bg-orange-900/20 p-3 rounded-2xl border border-orange-100 dark:border-orange-900/50">
                                                    <p className="text-[9px] font-bold text-orange-500 uppercase">Belum Dibayar</p>
                                                    <p className="font-black text-orange-600 dark:text-orange-400 text-sm">Rp {formatNumber(totalBelum)}</p>
                                                </div>
                                                <div className="bg-green-50 dark:bg-green-900/20 p-3 rounded-2xl border border-green-100 dark:border-green-900/50">
                                                    <p className="text-[9px] font-bold text-green-500 uppercase">Sudah Dibayar</p>
                                                    <p className="font-black text-green-600 dark:text-green-400 text-sm">Rp {formatNumber(totalDibayar)}</p>
                                                </div>
                                            </div>

                                            <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 p-3 rounded-2xl border border-slate-100 dark:border-slate-700">
                                                <span className="text-[10px] font-bold uppercase text-slate-500">Total Operasional</span>
                                                <span className="font-black text-slate-800 dark:text-white text-base">Rp {formatNumber(totalOpr)}</span>
                                            </div>

                                            {showMonthlyAgenda && (
                                                <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700 animate-fadeIn space-y-4">
                                                    
                                                    {/* Blok Belum Dibayar */}
                                                    <div className="space-y-2">
                                                        <p className="text-[9px] font-black uppercase tracking-widest text-orange-500 mb-2">⏳ Belum Dibayar</p>
                                                        {listBelumDibayar.length === 0 ? <p className="text-xs text-slate-400 font-bold italic">Aman, tidak ada tagihan.</p> :
                                                            listBelumDibayar.map(([title, amount], idx) => (
                                                                <div key={'belum-'+idx} className="flex justify-between items-center text-[11px] p-2.5 bg-orange-50 dark:bg-orange-900/10 border border-orange-100 dark:border-orange-900/30 rounded-xl">
                                                                    <span className="font-bold text-slate-600 dark:text-slate-300 uppercase truncate pr-2 max-w-[60%]">{idx+1}. {title}</span>
                                                                    <span className="font-black text-orange-600 dark:text-orange-400">Rp {formatNumber(amount)}</span>
                                                                </div>
                                                            ))
                                                        }
                                                    </div>

                                                    {/* Blok Sudah Dibayar */}
                                                    <div className="space-y-2">
                                                        <p className="text-[9px] font-black uppercase tracking-widest text-green-500 mb-2">✅ Sudah Dibayar (Lunas / Auto-solved)</p>
                                                        {listSudahDibayar.length === 0 ? <p className="text-xs text-slate-400 font-bold italic">Belum ada data pembayaran.</p> :
                                                            listSudahDibayar.map(([title, amount], idx) => (
                                                                <div key={'sudah-'+idx} className="flex justify-between items-center text-[11px] p-2.5 bg-green-50 dark:bg-green-900/10 border border-green-100 dark:border-green-900/30 rounded-xl">
                                                                    <span className="font-bold text-slate-600 dark:text-slate-300 uppercase truncate pr-2 max-w-[60%]">{idx+1}. {title}</span>
                                                                    <span className="font-black text-green-600 dark:text-green-400">Rp {formatNumber(amount)}</span>
                                                                </div>
                                                            ))
                                                        }
                                                    </div>

                                                </div>
                                            )}
                                        </div>
                                    )
                                })()}
                                
                                <div className="p-6 rounded-[2.5rem] bg-slate-900 text-white shadow-xl">
                                    <h2 className="font-extrabold uppercase text-[10px] tracking-widest mb-4 flex items-center gap-2"><div className="w-4 h-4"><Icons.Calendar /></div> Tambah Operasional / Tagihan</h2>
                                    <form onSubmit={handleAddAgenda} className="space-y-4">
                                        <input type="date" value={agendaDate} onChange={e => handleDateChange(e, setAgendaDate)} className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold text-white outline-none" />
                                        <input type="text" value={agendaTitle} onChange={e => setAgendaTitle(e.target.value)} placeholder="Misal: Sewa, Gaji, Uang Pribadi" className="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold outline-none placeholder-slate-500" />
                                        <div className="flex gap-2">
                                            {/* FITUR BARU 3: Tambah opsi Keperluan Pribadi */}
                                            <select value={agendaType} onChange={e => setAgendaType(e.target.value)} className="w-2/5 py-4 px-2 bg-slate-800 border border-slate-700 rounded-2xl font-bold outline-none appearance-none text-center">
                                                <option value="keluar">Keluar</option>
                                                <option value="masuk">Masuk</option>
                                                <option value="pribadi">Pribadi</option>
                                            </select>
                                            <input type="text" inputMode="numeric" value={formatInputRp(agendaAmount)} onChange={e => setAgendaAmount(parseInputRp(e.target.value))} placeholder="Nominal Rp" className="flex-1 p-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold text-right outline-none placeholder-slate-500" />
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-indigo-500 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest">SIMPAN</button>
                                    </form>
                                </div>

                                <div className="px-2">
                                    <h3 className="font-bold text-slate-400 text-[10px] uppercase tracking-widest mb-3">Agenda / Opr: {new Date(agendaDate).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</h3>
                                    {agendas.filter(a => a.date === agendaDate).length === 0 ? <p className="text-xs text-center text-slate-400 py-4 font-bold">Kosong.</p> : 
                                    agendas.filter(a => a.date === agendaDate).map(ag => {
                                        let isPast = ag.date < getLocalDateStr();
                                        return (
                                            <div key={ag.id} className={`p-4 rounded-2xl mb-2 flex items-center gap-3 shadow-sm border transition-all ${ag.isPaid || isPast ? 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 opacity-60' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                                <button onClick={() => { if(!isPast) setAgendas(prev => prev.map(a => a.id === ag.id ? { ...a, isPaid: !a.isPaid } : a)); }} className={`w-8 h-8 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${ag.isPaid || isPast ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 dark:border-slate-600 text-transparent'}`}>
                                                    <div className="w-4 h-4"><Icons.Check /></div>
                                                </button>
                                                <div className="flex-1">
                                                    <p className={`font-black text-xs uppercase ${ag.isPaid || isPast ? 'line-through text-slate-400' : 'text-slate-800 dark:text-slate-200'}`}>
                                                        {ag.type === 'pribadi' && <span className="text-[9px] bg-indigo-100 text-indigo-600 px-1 py-0.5 rounded mr-1">Owner</span>}
                                                        {ag.title}
                                                    </p>
                                                    {isPast && <span className="bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-[8px] px-1.5 py-0.5 rounded font-bold uppercase mt-1 inline-block">Auto-Solved</span>}
                                                </div>
                                                <div className="text-right flex flex-col items-end">
                                                    <p className={`font-black text-sm ${ag.type === 'keluar' || ag.type === 'pribadi' ? 'text-red-500 dark:text-red-400' : 'text-green-500 dark:text-green-400'}`}>{ag.type==='keluar' || ag.type==='pribadi'?'-':'+'} {formatNumber(ag.amount)}</p>
                                                    <div className="flex gap-2 items-center mt-1">
                                                        <button onClick={() => triggerAgendaPrompt(ag)} className="text-[9px] text-indigo-400 font-bold uppercase hover:text-indigo-600 dark:hover:text-indigo-300 flex items-center gap-0.5">
                                                            <div className="w-3 h-3"><Icons.Copy /></div> Prompt
                                                        </button>
                                                        <button onClick={() => deleteAgenda(ag.id)} className="text-[9px] text-red-300 dark:text-red-400 font-bold uppercase hover:text-red-500 ml-1">Hapus</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'arsip' && (
                            <div className="flex-1 overflow-y-auto no-scrollbar pb-32 space-y-4">
                                
                                <div className="bg-indigo-600 text-white p-6 rounded-[2.5rem] shadow-lg relative overflow-hidden mt-2 border border-indigo-500">
                                    <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                                    <h2 className="text-xl font-black tracking-tighter mb-1 relative z-10 flex items-center gap-2"><div className="w-5 h-5"><Icons.FileText/></div> Laporan Keuangan</h2>
                                    <p className="text-[10px] font-bold text-indigo-200 mb-4 relative z-10">Cetak Laporan PDF Bulanan Profesional</p>
                                    
                                    <div className="flex gap-2 relative z-10">
                                        <input type="month" value={reportMonth} onChange={(e) => setReportMonth(e.target.value)} className="flex-1 p-3 bg-white/10 border border-white/20 rounded-xl font-bold outline-none text-white text-sm" />
                                        <button onClick={() => { 
                                            const existingArchive = reportArchives.find(r => r.month === reportMonth);
                                            if (existingArchive) {
                                                setReportDataState(existingArchive);
                                                setReportAIInsight(existingArchive.aiInsight || '');
                                            } else {
                                                setReportDataState(getLaporanData(reportMonth)); 
                                                setReportAIInsight(''); 
                                            }
                                            setShowReportFullscreen(true); 
                                        }} className="px-4 bg-white text-indigo-600 font-black rounded-xl text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                                            BUKA
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden transition-colors mt-4">
                                    <h3 className="font-black text-slate-800 dark:text-slate-100 text-[11px] uppercase tracking-widest flex items-center gap-2 mb-4 border-b border-slate-100 dark:border-slate-700 pb-3">
                                        <div className="w-4 h-4 text-indigo-500"><Icons.Archive/></div> Arsip Laporan Tersimpan
                                    </h3>
                                    
                                    {reportArchives.length === 0 ? (
                                        <div className="text-center py-10">
                                            <p className="text-slate-400 dark:text-slate-500 font-bold text-[10px] uppercase tracking-widest">Belum ada arsip PDF.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {reportArchives.sort((a,b) => b.month.localeCompare(a.month)).map((ars, i) => (
                                                <div key={i} className="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-slate-200 dark:border-slate-700">
                                                    <div>
                                                        <p className="font-black text-xs uppercase text-slate-800 dark:text-slate-100">
                                                            {new Date(ars.month+'-01').toLocaleDateString('id-ID', {month:'long', year:'numeric'})}
                                                        </p>
                                                        <p className={`text-[9px] font-bold mt-0.5 ${ars.labaBersih >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                                            Laba: Rp {formatNumber(ars.labaBersih)}
                                                        </p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setReportDataState(ars); setReportAIInsight(ars.aiInsight || ''); setShowReportFullscreen(true); }} className="px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 font-black rounded-lg text-[9px] uppercase tracking-widest">Lihat</button>
                                                        <button onClick={() => hapusArsipLaporan(ars.month)} className="w-8 h-8 bg-red-50 dark:bg-red-900/30 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100"><div className="w-3.5 h-3.5"><Icons.Trash/></div></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        {/* RENDER MARKET MODE & LAPORAN FULLSCREEN */}
                        {showHppAnalysis && renderHppAnalysis()}
                        {showReportFullscreen && renderReportFullscreen()}
                        {showMarketMode && renderMarketMode()}
                    </main>

                    {/* Draggable Fin AI Button Wrapper */}
                    <div 
                        className={`fixed z-[550] transition-opacity duration-300 ${isChatOpen || showMarketMode ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                        style={{ right: `${finPos.right}px`, bottom: `${finPos.bottom}px`, touchAction: 'none' }}
                        onPointerDown={handleFinPointerDown}
                        onPointerMove={handleFinPointerMove}
                        onPointerUp={handleFinPointerUp}
                        onPointerCancel={handleFinPointerUp}
                    >
                        <button 
                            onClick={handleFinClick} 
                            className="relative bg-indigo-600 text-white p-4 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] border border-indigo-400 active:scale-95 transition-transform"
                        >
                            <div className="w-6 h-6 pointer-events-none"><Icons.MessageCircle /></div>
                            {hasNewFinAlert && <span className="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full animate-pulse pointer-events-none"></span>}
                        </button>
                    </div>

                    <div className={`fixed left-1/2 -translate-x-1/2 z-[160] transition-all duration-500 ease-in-out ${showNav || showMarketMode || showHppAnalysis || showReportFullscreen ? 'bottom-28 opacity-0 pointer-events-none translate-y-10' : 'bottom-6 opacity-100 translate-y-0'}`}>
                        <button onClick={() => setShowNav(true)} className="bg-slate-900/90 dark:bg-slate-800/90 backdrop-blur-md text-white px-5 py-3 rounded-full shadow-2xl border border-slate-700/50 flex items-center gap-2 hover:bg-slate-800 dark:hover:bg-slate-700 transition-colors">
                            <div className="w-5 h-5"><Icons.ChevronUp /></div>
                            <span className="text-[11px] font-black uppercase tracking-widest">Menu Utama</span>
                        </button>
                    </div>

                    <nav className={`fixed left-1/2 -translate-x-1/2 w-[95%] max-w-[420px] glass-nav rounded-[2.5rem] flex justify-between px-2 py-2 z-[150] shadow-2xl border border-slate-700/50 transition-all duration-500 ease-in-out ${showNav && !(showMarketMode || showHppAnalysis || showReportFullscreen) ? 'bottom-6 translate-y-0 opacity-100' : '-bottom-32 translate-y-full opacity-0 pointer-events-none'}`}>
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2">
                            <button onClick={() => setShowNav(false)} className="w-16 h-5 bg-slate-900/95 dark:bg-slate-800/95 backdrop-blur-md rounded-t-full flex items-center justify-center border-t border-x border-slate-700/50 dark:border-slate-600/50 text-slate-400 hover:text-white cursor-pointer group shadow-lg">
                                <div className="w-4 h-4 group-hover:translate-y-0.5 transition-transform"><Icons.ChevronDown /></div>
                            </button>
                        </div>

                        <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Bot /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">C-Flow</span>
                        </button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'plan' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.ShopBag /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Belanja</span>
                        </button>
                        <button onClick={() => setActiveTab('income')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'income' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Wallet /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Income</span>
                        </button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'agenda' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Calendar /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Operasi</span>
                        </button>
                        <button onClick={() => setActiveTab('arsip')} className={`flex-1 py-3 rounded-[2rem] flex flex-col items-center transition-all ${activeTab === 'arsip' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}>
                            <div className="w-5 h-5"><Icons.Archive /></div><span className="text-[7px] font-black uppercase mt-1 tracking-widest">Arsip</span>
                        </button>
                    </nav>

                    {renderFloatingFin()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
